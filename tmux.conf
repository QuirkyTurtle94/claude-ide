# claude-ide tmux config
# Copy to ~/.tmux.conf or append to your existing config

# Mouse support (clickable/resizable panes)
set -g mouse on

# Pane navigation (Alt+Arrow, no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Zoom toggle (Alt+z)
bind -n M-z resize-pane -Z

# Navigation hint bar (second status line)
set -g status 2
set -g status-format[1] "#[align=centre,fg=#888888,bg=#1a1a1a] Alt+Arrows: navigate panes  |  Alt+z: zoom/unzoom  |  Prefix+d: detach  |  q: quit yazi/lazygit "
